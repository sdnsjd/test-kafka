---
name: kafka-kraft

x-kafka-common: &kafka-common
  image: apache/kafka:4.1.1
  restart: unless-stopped
  networks:
    - kafka-net

services:

  kafka1:
    <<: *kafka-common
    container_name: kafka1
    hostname: kafka1
    ports:
      - "19092:9092"
      - "19093:19093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9094,2@kafka2:9094,3@kafka3:9094"

      KAFKA_LISTENERS: "SASL_PLAINTEXT://0.0.0.0:9092,SASL_SSL://0.0.0.0:9093,EXTERNAL_SASL_SSL://0.0.0.0:19093,CONTROLLER://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "SASL_PLAINTEXT://kafka1:9092,SASL_SSL://kafka1:9093,EXTERNAL_SASL_SSL://localhost:19093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL,EXTERNAL_SASL_SSL:SASL_SSL,CONTROLLER:PLAINTEXT"

      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_SSL_KEYSTORE_FILENAME: kafka1.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: keystore_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_CLIENT_AUTH: none

      KAFKA_AUTO_LEADER_REBALANCE_ENABLE: "true"
      KAFKA_LEADER_IMBALANCE_CHECK_INTERVAL_SECONDS: "60"
      KAFKA_LEADER_IMBALANCE_PER_BROKER_PERCENTAGE: "10"      

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-jaas.properties"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - ./certs/kafka1.keystore.jks:/etc/kafka/secrets/kafka1.keystore.jks:ro
      - ./certs/truststore.jks:/etc/kafka/secrets/truststore.jks:ro
      - ./certs/keystore_creds:/etc/kafka/secrets/keystore_creds:ro
      - ./config/kafka-jaas.properties:/opt/kafka/config/kafka-jaas.properties:ro
      - ./config/client-jaas.properties:/opt/kafka/config/client-jaas.properties:ro
      - ./config/bootstrap-client.properties:/opt/kafka/config/bootstrap-client.properties:ro
      - kafka1-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh",
             "--bootstrap-server", "localhost:9092",
             "--command-config", "/opt/kafka/config/bootstrap-client.properties"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka2:
    <<: *kafka-common
    container_name: kafka2
    hostname: kafka2
    ports:
      - "29092:9092"
      - "29093:29093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9094,2@kafka2:9094,3@kafka3:9094"

      KAFKA_LISTENERS: "SASL_PLAINTEXT://0.0.0.0:9092,SASL_SSL://0.0.0.0:9093,EXTERNAL_SASL_SSL://0.0.0.0:29093,CONTROLLER://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "SASL_PLAINTEXT://kafka2:9092,SASL_SSL://kafka2:9093,EXTERNAL_SASL_SSL://localhost:29093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL,EXTERNAL_SASL_SSL:SASL_SSL,CONTROLLER:PLAINTEXT"

      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_SSL_KEYSTORE_FILENAME: kafka2.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: keystore_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_CLIENT_AUTH: none

      KAFKA_AUTO_LEADER_REBALANCE_ENABLE: "true"
      KAFKA_LEADER_IMBALANCE_CHECK_INTERVAL_SECONDS: "60"
      KAFKA_LEADER_IMBALANCE_PER_BROKER_PERCENTAGE: "10"

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-jaas.properties"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - ./certs/kafka2.keystore.jks:/etc/kafka/secrets/kafka2.keystore.jks:ro
      - ./certs/truststore.jks:/etc/kafka/secrets/truststore.jks:ro
      - ./certs/keystore_creds:/etc/kafka/secrets/keystore_creds:ro
      - ./config/kafka-jaas.properties:/opt/kafka/config/kafka-jaas.properties:ro
      - ./config/client-jaas.properties:/opt/kafka/config/client-jaas.properties:ro
      - ./config/bootstrap-client.properties:/opt/kafka/config/bootstrap-client.properties:ro
      - kafka2-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh",
             "--bootstrap-server", "localhost:9092",
             "--command-config", "/opt/kafka/config/bootstrap-client.properties"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka3:
    <<: *kafka-common
    container_name: kafka3
    hostname: kafka3
    ports:
      - "39092:9092"
      - "39093:39093"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9094,2@kafka2:9094,3@kafka3:9094"

      KAFKA_LISTENERS: "SASL_PLAINTEXT://0.0.0.0:9092,SASL_SSL://0.0.0.0:9093,EXTERNAL_SASL_SSL://0.0.0.0:39093,CONTROLLER://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "SASL_PLAINTEXT://kafka3:9092,SASL_SSL://kafka3:9093,EXTERNAL_SASL_SSL://localhost:39093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "SASL_PLAINTEXT:SASL_PLAINTEXT,SASL_SSL:SASL_SSL,EXTERNAL_SASL_SSL:SASL_SSL,CONTROLLER:PLAINTEXT"

      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_SSL_KEYSTORE_FILENAME: kafka3.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: keystore_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_CLIENT_AUTH: none

      KAFKA_AUTO_LEADER_REBALANCE_ENABLE: "true"
      KAFKA_LEADER_IMBALANCE_CHECK_INTERVAL_SECONDS: "60"
      KAFKA_LEADER_IMBALANCE_PER_BROKER_PERCENTAGE: "10"

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN,SCRAM-SHA-512
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-jaas.properties"

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - ./certs/kafka3.keystore.jks:/etc/kafka/secrets/kafka3.keystore.jks:ro
      - ./certs/truststore.jks:/etc/kafka/secrets/truststore.jks:ro
      - ./certs/keystore_creds:/etc/kafka/secrets/keystore_creds:ro
      - ./config/kafka-jaas.properties:/opt/kafka/config/kafka-jaas.properties:ro
      - ./config/client-jaas.properties:/opt/kafka/config/client-jaas.properties:ro
      - ./config/bootstrap-client.properties:/opt/kafka/config/bootstrap-client.properties:ro
      - kafka3-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh",
             "--bootstrap-server", "localhost:9092",
             "--command-config", "/opt/kafka/config/bootstrap-client.properties"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    networks:
      - kafka-net
    ports:
      - "8080:8080"
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: "DISABLED"
      JAVA_OPTS: "-Djavax.net.debug=ssl:handshake:verbose"
    volumes:
        - ./certs:/certs:ro
        - ./config/kafka-ui.yaml:/etc/kafkaui/dynamic_config.yaml:ro

  nats:
    image: "nats-streaming"
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - kafka-net
      
  satellite:
    image: docker-release-platformeco.art.lmru.tech/kafka-satellite:latest
    environment:
      - NATS_ADDR=nats://nats:4222
      - KAFKA_IPC_VERSION=LATEST
      - LOGGER_LEVEL=debug
    depends_on:
      - nats
    networks:
      - kafka-net

networks:
  kafka-net:
    driver: bridge

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data: